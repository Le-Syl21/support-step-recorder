version: 2

# Les actions tierces sont épinglées au SHA : un tag de version est mutable
# (en mars 2026, 76 des 77 tags de trivy-action ont été force-pushés vers du
# code malveillant), seul un SHA est immuable. La contrepartie, c'est qu'on ne
# reçoit plus les correctifs automatiquement — c'est le rôle de Dependabot, qui
# sait mettre à jour un SHA épinglé et garder le commentaire de version à jour.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    # Une seule PR groupée plutôt qu'une par action.
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: ci
    ignore:
      # dtolnay/rust-toolchain n'a pas de « versions » : la réf désigne le
      # toolchain Rust à installer. Dependabot la lisait comme un numéro de
      # version d'action et proposait @1.92 -> @1.100, ce qui viderait un job
      # MSRV de son sens (et 1.100 n'existe même pas). La version voulue vit
      # désormais dans `with: toolchain:`, hors de sa portée.
      - dependency-name: dtolnay/rust-toolchain
