name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpipewire-0.3-dev libspa-0.2-dev clang \
            libxkbcommon-dev libwayland-dev libgl1-mesa-dev libdbus-1-dev \
            libx11-dev libxext-dev libxi-dev libxtst-dev libxrandr-dev libxcursor-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-randr0-dev libxcb-shm0-dev libgbm-dev

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpipewire-0.3-dev libspa-0.2-dev clang \
            libxkbcommon-dev libwayland-dev libgl1-mesa-dev libdbus-1-dev \
            libx11-dev libxext-dev libxi-dev libxtst-dev libxrandr-dev libxcursor-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-randr0-dev libxcb-shm0-dev libgbm-dev

      - name: Build (release)
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Run tests
        # Pas de tests sur macOS : le pont Swift de screencapturekit est lié en
        # double dans le binaire de test (ld: duplicate symbol CoreMediaBridge…).
        # La logique testée est indépendante de la plateforme et tourne déjà
        # sous Linux (x86_64 + aarch64) et Windows ; macOS ne fait que `build`.
        if: runner.os != 'macOS'
        run: cargo test --workspace --target ${{ matrix.target }}

      # --- Signature & notarisation Apple ---
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime \
            --sign "Developer ID Application: Sylvain Gargasson ($APPLE_TEAM_ID)" \
            --timestamp \
            target/${{ matrix.target }}/release/ssr

      - name: Notarize binary (macOS, tags only)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent \
            target/${{ matrix.target }}/release/ssr \
            $RUNNER_TEMP/ssr.zip

          # Soumission + attente, avec timeout et jusqu'à 3 tentatives (5/15/45 min).
          notarize_once() {
            local zip="$1" timeout="$2"
            local output
            output=$(xcrun notarytool submit "$zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --verbose 2>&1)
            echo "$output"
            local sub_id
            sub_id=$(echo "$output" | awk '/id:/{print $2; exit}')
            [ -n "$sub_id" ] || { echo "échec: pas d'ID de soumission"; return 1; }
            echo "soumis (id: $sub_id)"

            local deadline=$((SECONDS + timeout))
            while [ $SECONDS -lt $deadline ]; do
              sleep 30
              local info
              info=$(xcrun notarytool info "$sub_id" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" 2>&1) || { echo "erreur réseau, on repoll…"; continue; }
              local status
              status=$(echo "$info" | awk '/status:/{print $2; exit}')
              echo "statut: $status"
              case "$status" in
                Accepted) return 0 ;;
                Invalid|Rejected)
                  xcrun notarytool log "$sub_id" \
                    --apple-id "$APPLE_ID" \
                    --password "$APPLE_ID_PASSWORD" \
                    --team-id "$APPLE_TEAM_ID" 2>&1 || true
                  return 1 ;;
              esac
            done
            echo "timeout après $((timeout / 60)) min"
            return 2
          }

          backoffs=(300 900 2700)
          for i in 0 1 2; do
            echo "notarisation: tentative $((i + 1))/3"
            notarize_once "$RUNNER_TEMP/ssr.zip" "${backoffs[$i]}" && exit 0
            rc=$?
            [ $rc -eq 2 ] || exit $rc   # ne réessaie que sur timeout
          done
          exit 1

      # --- Empaquetage ---
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ssr-${{ matrix.label }}.tar.gz -C target/${{ matrix.target }}/release ssr

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/ssr.exe -DestinationPath ssr-${{ matrix.label }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ssr-${{ matrix.label }}
          path: ssr-${{ matrix.label }}.*

  # Authenticode-sign the Windows binary with ssign — the Linux runner signs it
  # via Certum (no Windows, no vendor stack). Gated by the `signing` environment
  # (owner approval); the release below needs it.
  sign-windows:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: signing
    steps:
      - name: Install ssign (prebuilt binary from the latest release)
        run: |
          curl -fsSL https://github.com/Le-Syl21/ssign/releases/latest/download/ssign-linux-x86_64.tar.gz | tar xz
          sudo install -m755 ssign /usr/local/bin/ssign

      - name: Download the Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: ssr-windows-x86_64
          path: dl

      - name: Sign ssr.exe with ssign (via Certum)
        env:
          CERTUM_EMAIL: ${{ secrets.CERTUM_EMAIL }}
          CERTUM_OTP: ${{ secrets.CERTUM_OTP }}
        run: |
          unzip -o dl/ssr-windows-x86_64.zip -d dl
          ssign --verbose \
            -n "support-step-recorder" -u "https://github.com/${{ github.repository }}" \
            dl/ssr.exe
          sudo apt-get update -qq && sudo apt-get install -y osslsigncode
          osslsigncode verify dl/ssr.exe 2>&1 | grep -q "Calculated message digest"
          (cd dl && rm -f ssr-windows-x86_64.zip && zip -j ssr-windows-x86_64.zip ssr.exe)

      - name: Re-upload the signed Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ssr-windows-x86_64
          path: dl/ssr-windows-x86_64.zip
          overwrite: true

  release:
    needs: [build, sign-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          # Les tags pré-release (v1.2.3-rc1, -beta…) sont marqués « pre-release »
          # dans l'UI GitHub — utile pour distribuer un binaire à tester sans en
          # faire une version officielle.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/**/*

  # Publication crates.io — UNIQUEMENT sur les tags finaux (pas les pré-releases
  # v*-rc/-beta), car un publish crates.io est définitif (on ne peut que « yank »,
  # jamais supprimer). Un tag `-rc` produit donc des binaires signés + une Release
  # GitHub, sans rien pousser sur crates.io.
  publish-crates:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpipewire-0.3-dev libspa-0.2-dev clang \
            libxkbcommon-dev libwayland-dev libgl1-mesa-dev libdbus-1-dev \
            libx11-dev libxext-dev libxi-dev libxtst-dev libxrandr-dev libxcursor-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-randr0-dev libxcb-shm0-dev libgbm-dev

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          # Publie en tolérant « already exists » (retag idempotent) et échoue sur
          # toute autre erreur. Le cœur d'abord ; l'interface en dépend.
          publish() {
            if cargo publish -p "$1" 2>&1 | tee /tmp/publish.log; then
              return 0
            elif grep -q "already exists" /tmp/publish.log; then
              echo "$1 : cette version est déjà sur crates.io — rien à faire"
              return 0
            else
              return 1
            fi
          }
          publish support-step-recorder-core || exit 1

          # Attend que crates.io indexe le cœur avant de publier l'interface.
          for i in $(seq 1 10); do
            publish support-step-recorder-gui && exit 0
            echo "index pas encore prêt, nouvelle tentative dans 30 s… ($i/10)"
            sleep 30
          done
          echo "échec de publication de l'interface" >&2
          exit 1
